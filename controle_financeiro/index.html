<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Controle Financeiro</title>
</head>
<body>
    <header>
        <div id="header">
            <h1>Controle Financeiro</h1>
        </div>
    </header>
    <main>
        <div id="container">
            <h2>Adicionar Gastos</h2>
            <form action="">
                <div class="form-line">
                    <label for=""></label>Descrição: <input type="text" name="desc" id="desc">
                </div>
                <div class="form-line">
                    <label for=""></label>Valor: <input type="number" name="preco" id="preco" step="0.01" min="0">
                </div>
                <div class="form-line">
                    <label for=""></label>Categoria: <input type="text" name="tipo" id="tipo">
                </div>
            </form>
        </div>
    </main>
    <footer>
        <div id="footer">
            <p>Made by: Guilherme Leonardo dos Santos 3ºDS</p>
        </div>
    </footer>
</body>
</html>
