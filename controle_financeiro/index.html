<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Controle Financeiro</title>
</head>
<body>
    <header>
        <div id="header">
            <h1>Controle Financeiro</h1>
        </div>
    </header>
    <main>
        <div id="container">
            <h2>GASTOS</h2>
            <hr>
            <form action="">
                <div class="form-line">
                    <div class="form-column"><label for="">Descrição</label></div>
                    <div class="form-column"><textarea name="desc" id="desc" placeholder="Digite aqui"></textarea></div>
                </div>
                <div class="form-line">
                    <div class="form-column"><label for="">Valor:</label></div>
                    <div class="form-column"><input type="number" name="preco" id="preco" step="0.01" min="0"></div>
                </div>
                <div class="form-line">
                    <div class="form-column"><label for="">Categoria:</label></div>
                    <div class="form-column"><input type="text" name="tipo" id="tipo"></div>
                </div>
                <div class="form-line">
                    <input type="button" value="Salvar">
                </div>
            </form>
        </div>
    </main>
    <footer>
        <div id="footer">
            <p>Made by: Guilherme Leonardo dos Santos 3ºDS</p>
        </div>
    </footer>
</body>
</html>
